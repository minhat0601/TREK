# Fly.io deployment manifest for TREK
# Replace "your-trek-app-name" with your actual Fly.io app name.
# Region "sin" = Singapore (lowest latency for Southeast Asia).
# See full region list: https://fly.io/docs/reference/regions/

app = "your-trek-app-name"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  TZ = "UTC"
  LOG_LEVEL = "info"
  TRUST_PROXY = "1"

# Single persistent volume for both database + uploads.
# Fly.io free tier allows up to 3 GB across all volumes.
[[mounts]]
  source = "trek_data"
  destination = "/app/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[http_service.checks]]
  grace_period = "15s"
  interval = "30s"
  method = "GET"
  path = "/api/health"
  timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
