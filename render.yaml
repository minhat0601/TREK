# render.yaml — Render Blueprint for TREK
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: trek
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: TZ
        value: UTC
      - key: TRUST_PROXY
        value: "1"
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: SUPABASE_URL
        sync: false  # Set manually in Render dashboard
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false  # Set manually in Render dashboard
    healthCheckPath: /api/health
